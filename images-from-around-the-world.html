<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Image Grid</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      justify-content: space-evenly;
      background-color: #f0f0f0;
    }

    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Replace this URL with the RSS feed URL you want to use
      const rssFeedUrl = 'https://catfood.toolforge.org/catfood.php?category=Featured_pictures_on_Wikimedia_Commons';

      fetch(rssFeedUrl)
        .then(response => response.text())
        .then(xml => {
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(xml, 'text/xml');
          const items = xmlDoc.querySelectorAll('item');

          items.forEach(item => {
            const imageUrl = item.querySelector('enclosure[link]')?.getAttribute('link');

            if (imageUrl) {
              const img = document.createElement('img');
              img.src = imageUrl;
              document.body.appendChild(img);
            }
          });
        })
        .catch(error => {
          console.error('Error fetching RSS feed:', error);
        });
    });
  </script>

</body>
</html>
